services:
  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.acme.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro

  certbot-init:
    image: certbot/certbot:latest
    profiles:
      - acme
    environment:
      DOMAIN: ${DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
      CERTBOT_EXTRA_ARGS: ${CERTBOT_EXTRA_ARGS:-}
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command: >
      -c "test -n \"$${DOMAIN}\" &&
      test -n \"$${ACME_EMAIL}\" &&
      certbot certonly
      --webroot
      --webroot-path /var/www/certbot
      --cert-name windchat
      --domain $${DOMAIN}
      --email $${ACME_EMAIL}
      --agree-tos
      --no-eff-email
      --non-interactive
      $${CERTBOT_EXTRA_ARGS}"

volumes:
  certbot_www:
  letsencrypt:
