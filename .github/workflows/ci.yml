name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check backend syntax
        working-directory: backend
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Audit backend production dependencies
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Docker Compose config
        env:
          POSTGRES_PASSWORD: ci_postgres_password
          JWT_SECRET: ci_jwt_secret_at_least_64_chars_long_for_validation_only_1234567890
          JWT_REFRESH_SECRET: ci_refresh_secret_at_least_64_chars_long_for_validation_only_1234567890
          MINIO_ROOT_PASSWORD: ci_minio_password
          S3_SECRET_KEY: ci_s3_secret
          ADMIN_SECRET: ci_admin_secret
        run: docker compose config --quiet
